<!DOCTYPE html>

<html lang="en">


    <head>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <link href="styles.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>ANAM</title>

        <script>
            // Wait for DOM to load
            document.addEventListener('DOMContentLoaded', function() {

                // Increasw the like counter and display thank you message
                count = 0;
                document.querySelector('#likeButton').addEventListener('click', function() {
                    count = count + 1;
                    document.querySelector('#likeCount').innerHTML = count;
                    document.querySelector('#responseFREE').innerHTML = 'Thank you for the Like !';
                })
            });
        </script>

    </head>


    <body>
        <!-- Feedback page of the site -->
        <h1>Welcome</h1>

        <!-- Creates menu bar -->
        <div class="menuBar">
            <h5 class="MenuItem"><a href="index.html">Home</a></h5>
            <h5 class="MenuItem"><a href="aboutMe.html">About Me</a></h5>
            <h5 class="MenuItem"><a href="contact.html">Contact</a></h5>
            <h5 class="MenuItem"><a href="feedback.html">Feedback</a></h5>
        </div>

        <!-- Division for contents of the page -->
        <div class="content">

            <!-- User profile picture -->
            <div id="image">
                <img src="spongebob-trans.png" alt="user profile picture">
                <p id="disclaimer">DISCLAIMER:<br>
                    Image for reference purpose only<br>
                    does NOT represent acual user !
                </p>
            </div>

            <!-- Details related to Feedback -->
            <div id="description">
                <div class="impBlue">Thanks for visiting !</div>

                <hr>

                <!-- Question -->
                <h3>You can show your appreciation by<br>
                    hitting the like button below
                </h3>

                <!-- Like button  -->
                <button id="likeButton">LIKE</button>
                <span class="impRed" id="likeCount"></span>

                <!-- Feedback message -->
                <div class="impRed" id='responseFREE'></div>
            </div>

        </div>

        <footer>
            <span id="copyright">&copy;</span> ANAM CS50x-2024
        </footer>

    </body>


</html>
