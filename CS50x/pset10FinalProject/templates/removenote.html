{% extends "layout.html" %}

{% block title %}
    RemoveNote
{% endblock %}

{% block main %}
    <form action="/removenote" method="post">
        <div class="mb-3">
            <select class="form-select mx-auto w-auto" name="title">
                <option disabled selected>select note's title</option>
                {% for options in data %}
                    <option value="{{ options.symbol }}">{{ options.symbol }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <input autocomplete="off" class="form-control mx-auto w-auto" name="shares" placeholder="Share" type="number" min="1">
        </div>

        <button class="btn btn-primary" type="submit">Sell</button>
    </form>
{% endblock %}
