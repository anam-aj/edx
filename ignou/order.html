<!DOCTYPE html>
<html>
<head>
    <title>Ordered Items</title>
    <style>
        body { background-color: lightblue; }
        ol { font-family: Arial, sans-serif; font-size: 12pt; background-color: lightblue; padding-left: 20px; }
        .order-container { background-color: white; padding: 10px; border-radius: 5px; width: 50%; }
    </style>
</head>
<body>
    <h2>Customer Order</h2>
    <div class="order-container">
        <ol>
            <li><strong>Code:</strong> 101 | <strong>Name:</strong> Milk | <strong>Price:</strong> $2.00 | <strong>Qty:</strong> 2</li>
            <li><strong>Code:</strong> 103 | <strong>Name:</strong> Eggs | <strong>Price:</strong> $3.00 | <strong>Qty:</strong> 1</li>
        </ol>
    </div>
</body>
</html>
