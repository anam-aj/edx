<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institute Admission Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Institute Online Admission Form</h1>

    <form id="admissionForm">
        <div>
            <label for="candidateName">Name of the candidate:</label><br>
            <input type="text" id="candidateName" name="candidateName">
        </div>
        <br>

        <div>
            <label for="motherName">Mother's Name:</label><br>
            <input type="text" id="motherName" name="motherName">
        </div>
        <br>

        <div>
            <label for="subject">Subject:</label><br>
            <select id="subject" name="subject">
                <option value="">--Select a Subject--</option>
                <option value="CS-01">CS-01</option>
                <option value="CS-02">CS-02</option>
                <option value="CS-03">CS-03</option>
                <option value="CS-04">CS-04</option>
            </select>
        </div>
        <br>

        <div>
            <label for="fee">Fee of the subject:</label><br>
            <input type="number" id="fee" name="fee">
        </div>
        <br>

        <div>
            <label>Have you registered for a subject earlier?</label><br>
            <input type="radio" id="regYes" name="registered" value="Yes">
            <label for="regYes" class="radio-label">Yes</label>
            <input type="radio" id="regNo" name="registered" value="No">
            <label for="regNo" class="radio-label">No</label>
        </div>
        <br>

        <div>
            <label for="background">Your Educational Background:</label><br>
            <textarea id="background" name="background" rows="4" cols="50"></textarea>
        </div>
        <br>

        <button type="submit" id="submitBtn">SUBMIT</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
