<!DOCTYPE html>
<html>
<head><title>Data Table</title></head>
<body>
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Alice Smith</td>
            <td>A</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Bob Johnson</td>
            <td>B+</td>
        </tr>
    </table>
</body>
</html>
