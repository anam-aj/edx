<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Examination System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-container { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; width: 400px; }
        input[type="text"], input[type="date"], input[type="number"] { width: 100%; margin-bottom: 10px; padding: 8px; }
        input[type="submit"], .btn { padding: 10px 15px; background: #0056b3; color: white; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <h2>Student Examination System</h2>

    <div class="form-container">
        <h3>1. Register New Student</h3>
        <form action="insertStudent.jsp" method="POST">
            <label>Student ID:</label>
            <input type="text" name="studentId" required>
            <label>Name:</label>
            <input type="text" name="name" required>
            <label>Programme Code:</label>
            <input type="text" name="progCode" required>
            <label>Date of Enrolment:</label>
            <input type="date" name="enrollDate" required>
            <input type="submit" value="Register Student">
        </form>
    </div>

    <div class="form-container">
        <h3>2. Record Fee Payment</h3>
        <form action="insertFee.jsp" method="POST">
            <label>Student ID:</label>
            <input type="text" name="studentId" required>
            <label>Semester:</label>
            <input type="number" name="semester" required>
            <label>Date of Payment:</label>
            <input type="date" name="paymentDate" required>
            <label>Amount Paid:</label>
            <input type="number" step="0.01" name="amount" required>
            <input type="submit" value="Submit Fee">
        </form>
    </div>

    <a href="display.jsp" class="btn">View All Student Fee Records</a>

</body>
</html>
