<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Dynamism</title>
    <script>
        function changeText() {
            document.getElementById("dynamicText").innerHTML = "This is a Demonstration of Dynamism";
        }
        function revertText() {
            document.getElementById("dynamicText").innerHTML = "The Power of JavaScript is Dynamism";
        }
    </script>
    <style>
        #dynamicText {
            font-size: 24px;
            font-weight: bold;
            color: darkblue;
            padding: 20px;
            display: inline-block;
            border: 1px solid #ccc;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="dynamicText" onmouseover="changeText()" onmouseout="revertText()">
        The Power of JavaScript is Dynamism
    </div>
</body>
</html>
