
<!DOCTYPE html>
<html>
<head>
    <title>Departmental Store Items</title>
    <style>
        body { background-color: lightblue; }
        table { width: 60%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; }
        th { font-family: "Times New Roman", Times, serif; font-size: 14pt; font-weight: bold; background-color: #aab7b8; }
        td { font-family: "Times New Roman", Times, serif; font-size: 12pt; }
        tr:nth-child(even) { background-color: lightgreen; }
        tr:nth-child(odd) { background-color: lightyellow; }
    </style>
</head>
<body>
    <h2>Store Inventory</h2>
    <table>
        <tr>
            <th>Item Code</th>
            <th>Item Name</th>
            <th>Unit Price</th>
            <th>Date of Expiry</th>
        </tr>
        <tr><td>101</td><td>Milk</td><td>$2.00</td><td>2024-12-01</td></tr>
        <tr><td>102</td><td>Bread</td><td>$1.50</td><td>2024-11-20</td></tr>
        <tr><td>103</td><td>Eggs</td><td>$3.00</td><td>2024-11-25</td></tr>
    </table>
</body>
</html>
