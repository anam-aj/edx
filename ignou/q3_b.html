<!DOCTYPE html>
<html>
<head>
    <title>Frameset Example</title>
</head>
<frameset cols="25%, 75%">
    <frame src="menu.html" name="navFrame">
    <frame src="content.html" name="contentFrame">

    <noframes>
        <body>
            <p>Your browser does not support frames. Please click <a href="content.html">here</a> to view the content.</p>
        </body>
    </noframes>
</frameset>
</html>
